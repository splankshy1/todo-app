<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frontend Group 2 | Todo app</title>
<link rel="icon" type="image/png" href="images/favicon-32x32.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-hero" aria-hidden="true"></div>

  <main class="wrapper">

    <header class="app-header">
      <h1>T O D O</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark theme">
        <svg id="iconSun" width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 0v3.5M13 22.5V26M26 13h-3.5M3.5 13H0M22.02 3.98l-2.475 2.475M6.455 19.545l-2.475 2.475M22.02 22.02l-2.475-2.475M6.455 6.455L3.98 3.98" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
          <circle cx="13" cy="13" r="5.5" fill="#FFF"/>
        </svg>
        <svg id="iconMoon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
          <path d="M7.5.9c.7 3.9 3.6 6.8 7.5 7.5-3.9.7-6.8 3.6-7.5 7.5C6.8 12 3.9 9.1 0 8.4 3.9 7.7 6.8 4.8 7.5.9z" fill="#FFF"/>
        </svg>
      </button>
    </header>

    <form class="new-todo" id="newTodoForm">
      <span class="checkbox-blank" aria-hidden="true"></span>
      <input type="text" id="newTodoInput" placeholder="Create a new todo…" aria-label="Create a new todo" autocomplete="off" />
    </form>

    <div class="todo-panel">
      <ul class="todo-list" id="todoList"></ul>

      <footer class="list-footer">
        <span class="items-left"><span id="itemsLeftCount">0</span> items left</span>
        <div class="filters filters-desktop" id="filtersDesktop">
          <button data-filter="all" class="filter-btn active">All</button>
          <button data-filter="active" class="filter-btn">Active</button>
          <button data-filter="completed" class="filter-btn">Completed</button>
        </div>
        <button class="clear-completed" id="clearCompleted">Clear Completed</button>
      </footer>
    </div>

    <div class="filters filters-mobile" id="filtersMobile">
      <button data-filter="all" class="filter-btn active">All</button>
      <button data-filter="active" class="filter-btn">Active</button>
      <button data-filter="completed" class="filter-btn">Completed</button>
    </div>

    <p class="drag-hint">Drag and drop to reorder list</p>

  </main>

  <template id="todoItemTemplate">
    <li class="todo-item" draggable="true">
      <button class="checkbox" aria-label="Toggle todo complete">
        <svg class="check-icon" width="11" height="9" viewBox="0 0 11 9" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 4.304L3.696 7l6-6" stroke="#FFF" stroke-width="2" fill="none" fill-rule="evenodd"/>
        </svg>
      </button>
      <span class="todo-text"></span>
      <button class="delete-btn" aria-label="Delete todo">
        <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M16.97 0l.708.707L9.546 8.85l8.132 8.132-.707.708-8.132-8.132-8.132 8.132L0 16.982l8.132-8.132L0 .718.707.01l8.132 8.132L16.971 0z" fill-rule="evenodd"/></svg>
      </button>
    </li>
  </template>

  <script src="script.js"></script>
</body>
</html>
